<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AKURA SafeStride</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <h1>AKURA SafeStride</h1>
                    <p class="tagline">Where Injury-Free Running Meets Science</p>
                </div>
            </div>

            <div class="auth-content">
                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to your account to continue</p>

                <!-- Alert Messages -->
                <div id="alert-container"></div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                        <span class="error-message" id="email-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="password-toggle" id="togglePassword">
                                <span class="eye-icon" id="eyeIcon">👁️</span>
                            </button>
                        </div>
                        <span class="error-message" id="password-error"></span>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader" style="display: none;">
                            <span class="spinner"></span>
                            Signing in...
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html" class="link">Sign up</a></p>
                </div>
            </div>
        </div>

        <div class="auth-bg">
            <div class="bg-pattern"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Initialize login page
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            if (isAuthenticated()) {
                redirectToDashboard();
            }

            // Password toggle
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            togglePassword.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                eyeIcon.textContent = type === 'password' ? '👁️' : '🙈';
            });

            // Form submission
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const remember = document.getElementById('remember').checked;

                // Clear previous errors
                clearErrors();

                // Validate inputs
                if (!validateEmail(email)) {
                    showError('email', 'Please enter a valid email address');
                    return;
                }

                if (password.length < 6) {
                    showError('password', 'Password must be at least 6 characters');
                    return;
                }

                // Show loading state
                setLoading(true);

                // Attempt login
                const result = await login(email, password);

                // Hide loading state
                setLoading(false);

                if (result.success) {
                    showAlert('success', 'Welcome back! Redirecting...');
                    setTimeout(() => {
                        redirectToDashboard();
                    }, 1000);
                } else {
                    showAlert('error', result.error || 'Login failed. Please try again.');
                }
            });

            // Real-time validation
            document.getElementById('email').addEventListener('blur', (e) => {
                const email = e.target.value.trim();
                if (email && !validateEmail(email)) {
                    showError('email', 'Please enter a valid email address');
                } else {
                    clearError('email');
                }
            });
        });

        // Helper functions
        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');
            
            btn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnLoader.style.display = isLoading ? 'inline-flex' : 'none';
        }

        function showError(field, message) {
            const errorElement = document.getElementById(`${field}-error`);
            const inputElement = document.getElementById(field);
            
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
            
            if (inputElement) {
                inputElement.classList.add('error');
            }
        }

        function clearError(field) {
            const errorElement = document.getElementById(`${field}-error`);
            const inputElement = document.getElementById(field);
            
            if (errorElement) {
                errorElement.textContent = '';
                errorElement.style.display = 'none';
            }
            
            if (inputElement) {
                inputElement.classList.remove('error');
            }
        }

        function clearErrors() {
            ['email', 'password'].forEach(field => clearError(field));
            document.getElementById('alert-container').innerHTML = '';
        }

        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span class="alert-icon">${type === 'success' ? '✓' : '✕'}</span>
                <span class="alert-message">${message}</span>
            `;
            container.innerHTML = '';
            container.appendChild(alert);
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
    </script>
</body>
</html>
