<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AKURA SafeStride</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <!-- Left Side: Runner Image -->
        <div class="auth-visual">
            <div class="visual-overlay"></div>
            <img src="https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=1200&q=80" alt="Runner" class="visual-image">
            <div class="visual-content">
                <div class="visual-logo">
                    <div class="logo-icon">🏃</div>
                    <span class="logo-text">AKURA SafeStride</span>
                </div>
                <h2 class="visual-title">Welcome Back</h2>
                <p class="visual-subtitle">Continue your journey to injury-free running</p>
                <div class="visual-stats">
                    <div class="visual-stat">
                        <i class="fas fa-users"></i>
                        <span>127+ Athletes</span>
                    </div>
                    <div class="visual-stat">
                        <i class="fas fa-shield-alt"></i>
                        <span>92% Injury Reduction</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <!-- Back to Home -->
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Home
                </a>

                <!-- Form Header -->
                <div class="form-header">
                    <h1>Sign In</h1>
                    <p>Access your personalized training dashboard</p>
                </div>

                <!-- Alert Container -->
                <div id="alertContainer"></div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required 
                                autocomplete="email"
                                placeholder="your.email@example.com"
                            >
                        </div>
                        <span class="error-message"></span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                required 
                                autocomplete="current-password"
                                placeholder="Enter your password"
                            >
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message"></span>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="link-text">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                            Signing in...
                        </span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Social Login (Optional - can be enabled later) -->
                <div class="social-login">
                    <button class="btn btn-social" disabled>
                        <i class="fab fa-google"></i>
                        Continue with Google
                    </button>
                </div>

                <!-- Sign Up Link -->
                <div class="form-footer">
                    <p>Don't have an account? <a href="register.html" class="link-primary">Sign up free</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        // Wait for DOM and Supabase to be ready
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Login page loaded');
            
            // Wait for Supabase to initialize
            await new Promise(resolve => setTimeout(resolve, 500));
            
            if (!window.AkuraAuth || !window.AkuraAuth.isReady()) {
                console.error('❌ AkuraAuth not initialized properly');
                showAlert('error', 'System error. Please refresh the page.');
                return;
            }
            
            console.log('✅ AkuraAuth ready');
            
            // Get form elements
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberMeCheckbox = document.getElementById('rememberMe');
            const loginBtn = document.getElementById('loginBtn');
            const passwordToggle = document.getElementById('passwordToggle');
            const alertContainer = document.getElementById('alertContainer');

            // Password toggle
            if (passwordToggle) {
                passwordToggle.addEventListener('click', function() {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    this.querySelector('i').classList.toggle('fa-eye');
                    this.querySelector('i').classList.toggle('fa-eye-slash');
                });
            }

            // Form validation
            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            function showFieldError(input, message) {
                const formGroup = input.closest('.form-group');
                const errorMessage = formGroup.querySelector('.error-message');
                formGroup.classList.add('error');
                errorMessage.textContent = message;
            }

            function clearFieldError(input) {
                const formGroup = input.closest('.form-group');
                const errorMessage = formGroup.querySelector('.error-message');
                formGroup.classList.remove('error');
                errorMessage.textContent = '';
            }

            // Real-time validation
            emailInput.addEventListener('blur', function() {
                if (this.value && !validateEmail(this.value)) {
                    showFieldError(this, 'Please enter a valid email address');
                } else {
                    clearFieldError(this);
                }
            });

            emailInput.addEventListener('input', function() {
                if (this.closest('.form-group').classList.contains('error')) {
                    clearFieldError(this);
                }
            });

            passwordInput.addEventListener('input', function() {
                if (this.closest('.form-group').classList.contains('error')) {
                    clearFieldError(this);
                }
            });

            // Form submission
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Clear previous errors
                clearFieldError(emailInput);
                clearFieldError(passwordInput);

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const rememberMe = rememberMeCheckbox ? rememberMeCheckbox.checked : false;

                // Validation
                let hasError = false;

                if (!email) {
                    showFieldError(emailInput, 'Email is required');
                    hasError = true;
                } else if (!validateEmail(email)) {
                    showFieldError(emailInput, 'Please enter a valid email address');
                    hasError = true;
                }

                if (!password) {
                    showFieldError(passwordInput, 'Password is required');
                    hasError = true;
                } else if (password.length < 6) {
                    showFieldError(passwordInput, 'Password must be at least 6 characters');
                    hasError = true;
                }

                if (hasError) {
                    return;
                }

                // Show loading state
                loginBtn.disabled = true;
                loginBtn.querySelector('.btn-text').style.display = 'none';
                loginBtn.querySelector('.btn-loader').style.display = 'flex';

                try {
                    console.log('🔐 Attempting to login:', email);
                    
                    // Sign in with Supabase
                    const { user, session, error } = await window.AkuraAuth.signIn(email, password);
                    
                    if (error) {
                        throw error;
                    }
                    
                    console.log('✅ Login successful for user:', user.id);
                    
                    // Handle remember me
                    if (rememberMe) {
                        localStorage.setItem('akura_remember_me', 'true');
                    } else {
                        localStorage.removeItem('akura_remember_me');
                    }
                    
                    // Get user profile for smart redirect
                    try {
                        console.log('📍 Fetching user profile for smart redirect...');
                        const { data: profile, error: profileError } = await window.AkuraAuth.supabase
                            .from('profiles')
                            .select('role, access_level, assessment_completed, assessment_skipped')
                            .eq('id', user.id)
                            .single();
                        
                        if (profileError) {
                            console.warn('⚠️ Profile fetch error:', profileError);
                            throw profileError;
                        }
                        
                        if (!profile) {
                            throw new Error('Profile not found');
                        }
                        
                        console.log('✅ Profile fetched:', {
                            role: profile.role,
                            access_level: profile.access_level,
                            assessment_completed: profile.assessment_completed,
                            assessment_skipped: profile.assessment_skipped
                        });
                        
                        // Store profile in sessionStorage for other pages
                        sessionStorage.setItem('userProfile', JSON.stringify(profile));
                        console.log('💾 Profile stored in sessionStorage');
                        
                        // Smart redirect logic based on assessment status
                        let redirectUrl = 'athlete-dashboard.html';
                        let redirectMsg = 'Redirecting to your dashboard...';
                        
                        // Priority 1: Check if assessment is completed
                        if (!profile.assessment_completed && !profile.assessment_skipped) {
                            // New user - haven't started or skipped assessment
                            redirectUrl = '/assessment-intake.html';
                            redirectMsg = "Let's complete your profile assessment";
                            console.log('🎯 Redirect Decision: New user - assessment not started. → Assessment');
                        } 
                        // Priority 2: Check if assessment was skipped
                        else if (!profile.assessment_completed && profile.assessment_skipped) {
                            // User skipped assessment - go to dashboard (banner will show reminder)
                            redirectUrl = '/athlete-dashboard.html';
                            redirectMsg = 'Welcome back! Complete your assessment to unlock personalized training.';
                            console.log('🎯 Redirect Decision: Assessment skipped. → Dashboard (with reminder banner)');
                        }
                        // Priority 3: Assessment completed
                        else if (profile.assessment_completed) {
                            // Assessment is done - redirect based on role
                            if (profile.role === 'coach') {
                                redirectUrl = '/coach-dashboard.html';
                                console.log('🎯 Redirect Decision: Assessment complete + Coach role. → Coach Dashboard');
                            } else {
                                redirectUrl = '/athlete-dashboard.html';
                                console.log('🎯 Redirect Decision: Assessment complete + Athlete role. → Athlete Dashboard');
                            }
                        }
                        
                        console.log('🚀 Redirecting to:', redirectUrl);
                        showAlert('success', 'Login successful! ' + redirectMsg);
                        
                        setTimeout(() => {
                            window.location.href = redirectUrl;
                        }, 2000);
                        
                    } catch (profileError) {
                        console.error('❌ Profile fetch failed:', profileError);
                        console.log('🚀 Using default redirect to athlete dashboard');
                        showAlert('success', 'Login successful! Redirecting to your dashboard...');
                        
                        setTimeout(() => {
                            window.location.href = '/athlete-dashboard.html';
                        }, 2000);
                    }
                    
                } catch (error) {
                    console.error('❌ Login error:', error);
                    
                    // Handle specific errors
                    let errorMsg = 'Login failed. Please try again.';
                    
                    if (error.message.includes('Invalid login credentials')) {
                        errorMsg = 'Invalid email or password. Please try again.';
                    } else if (error.message.includes('Email not confirmed')) {
                        errorMsg = 'Please verify your email before logging in.';
                    } else if (error.message.includes('too many requests')) {
                        errorMsg = 'Too many login attempts. Please try again later.';
                    } else if (error.message) {
                        errorMsg = error.message;
                    }
                    
                    showAlert('error', errorMsg);
                    
                    // Reset button
                    loginBtn.disabled = false;
                    loginBtn.querySelector('.btn-text').style.display = 'inline';
                    loginBtn.querySelector('.btn-loader').style.display = 'none';
                }
            });

            // Alert function
            function showAlert(type, message) {
                const alert = document.createElement('div');
                alert.className = `alert alert-${type}`;
                alert.innerHTML = `
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                    <span>${message}</span>
                `;
                alertContainer.innerHTML = '';
                alertContainer.appendChild(alert);

                // Auto-hide success messages
                if (type === 'success') {
                    setTimeout(() => {
                        alert.remove();
                    }, 3000);
                }
            }
        });
    </script>
</body>
</html>
