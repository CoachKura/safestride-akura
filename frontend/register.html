<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account - AKURA SafeStride</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Auth CSS -->
    <link rel="stylesheet" href="css/auth.css">
    
    <style>
        /* Additional inline styles for quick fixes */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }
        
        .auth-container {
            display: flex;
            min-height: 100vh;
        }
        
        .auth-image {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=1200&q=80') center/cover;
            position: relative;
        }
        
        .auth-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8) 0%, rgba(16, 185, 129, 0.8) 100%);
        }
        
        .auth-image-content {
            position: relative;
            z-index: 1;
            color: white;
            padding: 60px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .auth-form {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }
        
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: #FEE2E2;
            border: 1px solid #EF4444;
            color: #991B1B;
        }
        
        .alert-success {
            background: #D1FAE5;
            border: 1px solid #10B981;
            color: #065F46;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3B82F6 0%, #10B981 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .password-strength {
            font-size: 14px;
            margin-top: 8px;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
            }
            
            .auth-image {
                min-height: 200px;
            }
            
            .auth-form {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Left Side - Image -->
        <div class="auth-image">
            <div class="auth-image-content">
                <div style="display: flex; align-items: center; margin-bottom: 40px;">
                    <i class="fas fa-running" style="font-size: 32px; margin-right: 12px;"></i>
                    <h1 style="font-size: 28px; margin: 0;">AKURA SafeStride</h1>
                </div>
                <h2 style="font-size: 40px; line-height: 1.2; margin-bottom: 20px;">Start Your Journey</h2>
                <p style="font-size: 18px; opacity: 0.9;">Join 127+ athletes running smarter, safer, and longer</p>
                <div style="margin-top: 40px;">
                    <div style="margin-bottom: 16px;">
                        <i class="fas fa-check-circle" style="margin-right: 8px;"></i> Personalized training plans
                    </div>
                    <div style="margin-bottom: 16px;">
                        <i class="fas fa-check-circle" style="margin-right: 8px;"></i> Real-time progress tracking
                    </div>
                    <div>
                        <i class="fas fa-check-circle" style="margin-right: 8px;"></i> 92% injury reduction rate
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right Side - Form -->
        <div class="auth-form">
            <a href="index.html" style="color: #3B82F6; text-decoration: none; margin-bottom: 20px; display: inline-block;">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
            
            <h2 style="font-size: 32px; margin-bottom: 12px; color: #111827;">Create Your Account</h2>
            <p style="color: #6B7280; margin-bottom: 32px;">Start your free assessment in minutes</p>
            
            <!-- Error Message -->
            <div id="errorMessage" class="alert alert-error"></div>
            
            <!-- Success Message -->
            <div id="successMessage" class="alert alert-success"></div>
            
            <!-- Registration Form -->
            <form id="registerForm">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="fullName">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input 
                        type="text" 
                        id="fullName" 
                        placeholder="John Doe"
                        required
                        minlength="2"
                    >
                </div>
                
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="you@example.com"
                        required
                    >
                </div>
                
                <!-- Password -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="At least 6 characters"
                        required
                        minlength="6"
                    >
                    <div id="passwordStrength" class="password-strength"></div>
                </div>
                
                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="Re-enter your password"
                        required
                    >
                </div>
                
                <!-- Role Selection -->
                <div class="form-group">
                    <label for="role">
                        <i class="fas fa-user-tag"></i> I am a...
                    </label>
                    <select id="role" required>
                        <option value="">Select your role</option>
                        <option value="athlete">Athlete - Get personalized training</option>
                        <option value="coach">Coach - Manage your athletes</option>
                    </select>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn-primary" id="submitButton">
                    Create Account
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 24px; color: #6B7280;">
                Already have an account? 
                <a href="login.html" style="color: #3B82F6; text-decoration: none; font-weight: 500;">Sign In</a>
            </p>
        </div>
    </div>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Auth Module -->
    <script src="js/auth.js"></script>
    
    <!-- Registration Logic -->
    <script>
    document.addEventListener('DOMContentLoaded', async function() {
        console.log('🚀 Registration page loaded');
        
        // Wait for auth module to initialize
        await new Promise(resolve => setTimeout(resolve, 200));
        
        // Check if AkuraAuth is available
        if (!window.AkuraAuth || !window.AkuraAuth.isReady()) {
            console.error('❌ AkuraAuth not initialized');
            showError('System error. Please refresh the page.');
            return;
        }
        
        console.log('✅ AkuraAuth ready - Setting up form handlers');
        
        // Get form elements
        const form = document.getElementById('registerForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const roleSelect = document.getElementById('role');
        const submitButton = document.getElementById('submitButton');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const passwordStrength = document.getElementById('passwordStrength');
        
        // Password strength indicator
        if (passwordInput && passwordStrength) {
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                let strength = 'Weak';
                let color = '#EF4444';
                
                if (password.length >= 8) {
                    strength = 'Medium';
                    color = '#F59E0B';
                }
                if (password.length >= 12 && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    strength = 'Strong';
                    color = '#10B981';
                }
                
                passwordStrength.textContent = 'Strength: ' + strength;
                passwordStrength.style.color = color;
            });
        }
        
        // Form submission
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('📝 Form submitted');
                
                // Clear messages
                hideError();
                hideSuccess();
                
                // Get values
                const fullName = fullNameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                const role = roleSelect.value;
                
                // Validate
                if (!fullName || fullName.length < 2) {
                    showError('Please enter your full name (at least 2 characters)');
                    return;
                }
                
                if (!email || !isValidEmail(email)) {
                    showError('Please enter a valid email address');
                    return;
                }
                
                if (!password || password.length < 6) {
                    showError('Password must be at least 6 characters');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }
                
                if (!role) {
                    showError('Please select your role');
                    return;
                }
                
                // Show loading
                submitButton.disabled = true;
                submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                
                try {
                    console.log('📤 Sending registration request...');
                    
                    // Call AkuraAuth.signUp
                    const result = await window.AkuraAuth.signUp(email, password, {
                        full_name: fullName,
                        role: role,
                        access_level: 'demo',
                        assessment_completed: false
                    });
                    
                    console.log('✅ Registration successful:', result);
                    
                    // Create profile record in database
                    if (result.user) {
                        console.log('📝 Creating profile record...');
                        try {
                            const { error: profileError } = await window.AkuraAuth.supabase
                                .from('profiles')
                                .insert({
                                    user_id: result.user.id,
                                    full_name: fullName,
                                    role: role,
                                    access_level: 'demo',
                                    assessment_completed: false,
                                    created_at: new Date().toISOString(),
                                    updated_at: new Date().toISOString()
                                });
                            
                            if (profileError) {
                                console.error('⚠️ Profile creation error:', profileError);
                                // Continue anyway - profile can be created later
                            } else {
                                console.log('✅ Profile record created');
                            }
                        } catch (profileError) {
                            console.error('⚠️ Profile creation failed:', profileError);
                            // Continue anyway
                        }
                    }
                    
                    // Show success
                    showSuccess('Account created successfully! Redirecting to assessment...');
                    
                    // Clear form
                    form.reset();
                    
                    // Redirect to assessment directly (not login)
                    setTimeout(() => {
                        // Auto-login the user
                        const { user, session, error: loginError } = await window.AkuraAuth.signIn(email, password);
                        if (!loginError && user) {
                            window.location.href = 'assessment-intake.html';
                        } else {
                            window.location.href = 'login.html';
                        }
                    }, 1500);
                    
                } catch (error) {
                    console.error('❌ Registration error:', error);
                    
                    let errorMsg = 'Registration failed. Please try again.';
                    
                    if (error.message) {
                        if (error.message.includes('already registered') || error.message.includes('already exists')) {
                            errorMsg = 'This email is already registered. Try logging in instead.';
                        } else if (error.message.includes('Invalid email')) {
                            errorMsg = 'Please enter a valid email address.';
                        } else if (error.message.includes('weak password') || error.message.includes('password')) {
                            errorMsg = 'Password is too weak. Please use a stronger password.';
                        } else {
                            errorMsg = error.message;
                        }
                    }
                    
                    showError(errorMsg);
                    
                    // Reset button
                    submitButton.disabled = false;
                    submitButton.innerHTML = 'Create Account';
                }
            });
        }
        
        // Helper functions
        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function showError(message) {
            if (errorMessage) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                errorMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
        
        function hideError() {
            if (errorMessage) {
                errorMessage.style.display = 'none';
            }
        }
        
        function showSuccess(message) {
            if (successMessage) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
                successMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
        
        function hideSuccess() {
            if (successMessage) {
                successMessage.style.display = 'none';
            }
        }
    });
    </script>
</body>
</html>
