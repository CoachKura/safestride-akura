<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AKURA SafeStride</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <!-- Left Side: Runner Image -->
        <div class="auth-visual">
            <div class="visual-overlay"></div>
            <img src="https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=1200&q=80" alt="Runner" class="visual-image">
            <div class="visual-content">
                <div class="visual-logo">
                    <div class="logo-icon">🏃</div>
                    <span class="logo-text">AKURA SafeStride</span>
                </div>
                <h2 class="visual-title">Start Your Journey</h2>
                <p class="visual-subtitle">Join 127+ athletes running smarter, safer, and longer</p>
                <div class="visual-features">
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Personalized training plans</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Real-time progress tracking</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>92% injury reduction rate</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Register Form -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <!-- Back to Home -->
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Home
                </a>

                <!-- Form Header -->
                <div class="form-header">
                    <h1>Create Your Account</h1>
                    <p>Start your free assessment in minutes</p>
                </div>

                <!-- Alert Container -->
                <div id="alertContainer"></div>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user"></i>
                            <input 
                                type="text" 
                                id="fullName" 
                                name="fullName" 
                                required 
                                autocomplete="name"
                                placeholder="John Doe"
                            >
                        </div>
                        <span class="error-message"></span>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required 
                                autocomplete="email"
                                placeholder="your.email@example.com"
                            >
                        </div>
                        <span class="error-message"></span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                required 
                                autocomplete="new-password"
                                placeholder="Create a strong password"
                            >
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <!-- Password Strength Indicator -->
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar">
                                <div class="strength-fill"></div>
                            </div>
                            <span class="strength-text"></span>
                        </div>
                        <span class="error-message"></span>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                required 
                                autocomplete="new-password"
                                placeholder="Re-enter your password"
                            >
                            <button type="button" class="password-toggle" id="confirmPasswordToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message"></span>
                    </div>

                    <!-- Role Selection -->
                    <div class="form-group">
                        <label>I am a...</label>
                        <div class="role-selection">
                            <label class="role-card">
                                <input type="radio" name="role" value="athlete" checked>
                                <div class="role-content">
                                    <i class="fas fa-running"></i>
                                    <h4>Athlete</h4>
                                    <p>Get personalized training</p>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="role" value="coach">
                                <div class="role-content">
                                    <i class="fas fa-clipboard-list"></i>
                                    <h4>Coach</h4>
                                    <p>Manage your athletes</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="termsAccepted" name="termsAccepted" required>
                            <span>I agree to the <a href="#terms" class="link-text">Terms of Service</a> and <a href="#privacy" class="link-text">Privacy Policy</a></span>
                        </label>
                        <span class="error-message"></span>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                        <span class="btn-text">Create Account</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                            Creating account...
                        </span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Social Register (Optional - can be enabled later) -->
                <div class="social-login">
                    <button class="btn btn-social" disabled>
                        <i class="fab fa-google"></i>
                        Sign up with Google
                    </button>
                </div>

                <!-- Sign In Link -->
                <div class="form-footer">
                    <p>Already have an account? <a href="login.html" class="link-primary">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const fullNameInput = document.getElementById('fullName');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const termsCheckbox = document.getElementById('termsAccepted');
            const registerBtn = document.getElementById('registerBtn');
            const passwordToggle = document.getElementById('passwordToggle');
            const confirmPasswordToggle = document.getElementById('confirmPasswordToggle');

            // Password toggles
            passwordToggle.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });

            confirmPasswordToggle.addEventListener('click', function() {
                const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
                confirmPasswordInput.type = type;
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });

            // Password strength checker
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                const strength = calculatePasswordStrength(password);
                updatePasswordStrength(strength);
            });

            function calculatePasswordStrength(password) {
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.length >= 12) strength++;
                if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
                if (/\d/.test(password)) strength++;
                if (/[^A-Za-z0-9]/.test(password)) strength++;
                return Math.min(strength, 4);
            }

            function updatePasswordStrength(strength) {
                const strengthElement = document.getElementById('passwordStrength');
                const fill = strengthElement.querySelector('.strength-fill');
                const text = strengthElement.querySelector('.strength-text');
                
                const levels = ['Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
                const colors = ['#EF4444', '#F59E0B', '#EAB308', '#10B981', '#059669'];
                
                if (passwordInput.value.length === 0) {
                    fill.style.width = '0%';
                    text.textContent = '';
                    strengthElement.style.display = 'none';
                    return;
                }
                
                strengthElement.style.display = 'block';
                fill.style.width = `${(strength / 4) * 100}%`;
                fill.style.backgroundColor = colors[strength];
                text.textContent = levels[strength];
                text.style.color = colors[strength];
            }

            // Form validation functions
            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            function showFieldError(input, message) {
                const formGroup = input.closest('.form-group');
                const errorMessage = formGroup.querySelector('.error-message');
                formGroup.classList.add('error');
                errorMessage.textContent = message;
            }

            function clearFieldError(input) {
                const formGroup = input.closest('.form-group');
                const errorMessage = formGroup.querySelector('.error-message');
                formGroup.classList.remove('error');
                errorMessage.textContent = '';
            }

            // Real-time validation
            fullNameInput.addEventListener('blur', function() {
                if (this.value.trim().length < 2) {
                    showFieldError(this, 'Please enter your full name');
                } else {
                    clearFieldError(this);
                }
            });

            emailInput.addEventListener('blur', function() {
                if (this.value && !validateEmail(this.value)) {
                    showFieldError(this, 'Please enter a valid email address');
                } else {
                    clearFieldError(this);
                }
            });

            confirmPasswordInput.addEventListener('blur', function() {
                if (this.value && this.value !== passwordInput.value) {
                    showFieldError(this, 'Passwords do not match');
                } else {
                    clearFieldError(this);
                }
            });

            // Clear errors on input
            [fullNameInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => {
                input.addEventListener('input', function() {
                    if (this.closest('.form-group').classList.contains('error')) {
                        clearFieldError(this);
                    }
                });
            });

            // Form submission
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Clear previous errors
                [fullNameInput, emailInput, passwordInput, confirmPasswordInput, termsCheckbox].forEach(clearFieldError);

                const fullName = fullNameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                const role = document.querySelector('input[name="role"]:checked').value;
                const termsAccepted = termsCheckbox.checked;

                // Validation
                let hasError = false;

                if (fullName.length < 2) {
                    showFieldError(fullNameInput, 'Please enter your full name');
                    hasError = true;
                }

                if (!validateEmail(email)) {
                    showFieldError(emailInput, 'Please enter a valid email address');
                    hasError = true;
                }

                if (password.length < 6) {
                    showFieldError(passwordInput, 'Password must be at least 6 characters');
                    hasError = true;
                }

                if (password !== confirmPassword) {
                    showFieldError(confirmPasswordInput, 'Passwords do not match');
                    hasError = true;
                }

                if (!termsAccepted) {
                    showFieldError(termsCheckbox, 'You must accept the terms and conditions');
                    hasError = true;
                }

                if (hasError) {
                    return;
                }

                // Show loading state
                registerBtn.disabled = true;
                registerBtn.querySelector('.btn-text').style.display = 'none';
                registerBtn.querySelector('.btn-loader').style.display = 'flex';

                try {
                    // Use the Auth.register function from auth.js
                    const result = await Auth.register(email, password, fullName, role);

                    if (result.success) {
                        showAlert('success', 'Account created! Please check your email to verify your account.');
                        
                        // Redirect to login after a short delay
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                    } else {
                        showAlert('error', result.error || 'Registration failed. Please try again.');
                        
                        // Reset button
                        registerBtn.disabled = false;
                        registerBtn.querySelector('.btn-text').style.display = 'inline';
                        registerBtn.querySelector('.btn-loader').style.display = 'none';
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    showAlert('error', 'An unexpected error occurred. Please try again.');
                    
                    // Reset button
                    registerBtn.disabled = false;
                    registerBtn.querySelector('.btn-text').style.display = 'inline';
                    registerBtn.querySelector('.btn-loader').style.display = 'none';
                }
            });

            // Alert function
            function showAlert(type, message) {
                const alertContainer = document.getElementById('alertContainer');
                const alert = document.createElement('div');
                alert.className = `alert alert-${type}`;
                alert.innerHTML = `
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                    <span>${message}</span>
                `;
                alertContainer.innerHTML = '';
                alertContainer.appendChild(alert);
            }

            // Check if user is already logged in
            if (Auth.isAuthenticated()) {
                window.location.href = Auth.getRedirectPath();
            }
        });
    </script>
</body>
</html>
