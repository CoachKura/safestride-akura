<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AKURA SafeStride</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <h1>AKURA SafeStride</h1>
                    <p class="tagline">Where Injury-Free Running Meets Science</p>
                </div>
            </div>

            <div class="auth-content">
                <h2>Reset Your Password</h2>
                <p class="subtitle">Enter your email address and we'll send you a link to reset your password</p>

                <!-- Alert Messages -->
                <div id="alert-container"></div>

                <!-- Forgot Password Form -->
                <form id="forgotPasswordForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                        <span class="error-message" id="email-error"></span>
                    </div>

                    <button type="submit" class="btn btn-primary" id="resetBtn">
                        <span class="btn-text">Send Reset Link</span>
                        <span class="btn-loader" style="display: none;">
                            <span class="spinner"></span>
                            Sending...
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html" class="link">Sign in</a></p>
                    <p>Don't have an account? <a href="register.html" class="link">Sign up</a></p>
                </div>
            </div>
        </div>

        <div class="auth-bg">
            <div class="bg-pattern"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Initialize forgot password page
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            if (isAuthenticated()) {
                redirectToDashboard();
            }

            // Form submission
            const forgotPasswordForm = document.getElementById('forgotPasswordForm');
            forgotPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();

                // Clear previous errors
                clearErrors();

                // Validate email
                if (!validateEmail(email)) {
                    showError('email', 'Please enter a valid email address');
                    return;
                }

                // Show loading state
                setLoading(true);

                // Send reset email
                const result = await resetPassword(email);

                // Hide loading state
                setLoading(false);

                if (result.success) {
                    showAlert('success', 'Password reset link sent! Please check your email.');
                    
                    // Clear form
                    forgotPasswordForm.reset();
                    
                    // Optional: redirect to login after a few seconds
                    setTimeout(() => {
                        showAlert('info', 'Redirecting to login page...');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    }, 3000);
                } else {
                    showAlert('error', result.error || 'Failed to send reset link. Please try again.');
                }
            });

            // Real-time validation
            document.getElementById('email').addEventListener('blur', (e) => {
                const email = e.target.value.trim();
                if (email && !validateEmail(email)) {
                    showError('email', 'Please enter a valid email address');
                } else {
                    clearError('email');
                }
            });
        });

        // Helper functions
        function setLoading(isLoading) {
            const btn = document.getElementById('resetBtn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');
            
            btn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnLoader.style.display = isLoading ? 'inline-flex' : 'none';
        }

        function showError(field, message) {
            const errorElement = document.getElementById(`${field}-error`);
            const inputElement = document.getElementById(field);
            
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
            
            if (inputElement) {
                inputElement.classList.add('error');
            }
        }

        function clearError(field) {
            const errorElement = document.getElementById(`${field}-error`);
            const inputElement = document.getElementById(field);
            
            if (errorElement) {
                errorElement.textContent = '';
                errorElement.style.display = 'none';
            }
            
            if (inputElement) {
                inputElement.classList.remove('error');
            }
        }

        function clearErrors() {
            clearError('email');
            document.getElementById('alert-container').innerHTML = '';
        }

        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            const icon = type === 'success' ? '✓' : (type === 'info' ? 'ℹ' : '✕');
            alert.innerHTML = `
                <span class="alert-icon">${icon}</span>
                <span class="alert-message">${message}</span>
            `;
            container.innerHTML = '';
            container.appendChild(alert);
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
    </script>
</body>
</html>
